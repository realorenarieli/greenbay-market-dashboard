<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenbay Solutions — Fleet Orchestration Market Dashboard</title>
  <meta name="description" content="Fleet Orchestration Market Intelligence: TAM/SAM/SOM, ARR scenarios, AV fleet data, and Greenbay opportunity sizing." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0f; color: #00d4aa; font-family: 'DM Mono', monospace;
      font-size: 13px; gap: 16px; z-index: 999;
    }
    .spinner {
      width: 32px; height: 32px; border: 2px solid #1a1a2e;
      border-top-color: #00d4aa; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading dashboard…</span>
  </div>
  <div id="root"></div>

  <script type="text/babel" src="transport_predictions_v2.jsx" data-type="module"></script>
  <script>
    // Hide loader once React mounts
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        document.getElementById('loading').style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });

    // Fallback: hide after 8s
    setTimeout(() => {
      const l = document.getElementById('loading');
      if (l) l.style.display = 'none';
    }, 8000);
  </script>
</body>
</html>
