<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenbay Solutions — Fleet Orchestration Market Dashboard</title>
  <meta name="description" content="Fleet Orchestration Market Intelligence: TAM/SAM/SOM, ARR scenarios, AV fleet data." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050B18; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #050B18; color: #00d4aa;
      font-family: monospace; font-size: 13px; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px; border: 2px solid #1a2e4a;
      border-top-color: #00d4aa; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><span>Loading dashboard…</span></div>
  <div id="root"></div>
  <script src="dashboard.js"></script>
</body>
</html>
